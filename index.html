<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CloseAI - Freelance Helper</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { padding: 10px 20px; margin-right: 10px; }
        #output { margin-top: 20px; white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; }
        #loading { display: none; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>CloseAI - Freelance Helper</h1>
    <p>Escribí tu pedido:</p>
    <textarea id="input" placeholder="Describe lo que querés que haga la IA..."></textarea><br>
    
    <button onclick="generar('propuesta')">Propuesta</button>
    <button onclick="generar('respuesta')">Respuesta</button>
    <button onclick="generar('precio')">Precio</button>
    
    <pre id="output"></pre>
<p id="loading" style="display:none;">Generando respuesta...</p>

<script>
async function generar(tipo) {
    const input = document.getElementById("input").value;
    const output = document.getElementById("output");
    const loading = document.getElementById("loading");

    output.innerText = "";
    loading.style.display = "block";

    try {
        // 🔹 PONÉ AQUÍ tu URL de ngrok actual
        const NGROK_URL = "https://untentacled-apologetic-alex.ngrok-free.dev";

        // Llamada al endpoint correcto según el botón
        const res = await fetch(`${NGROK_URL}/${tipo}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input })
        });

        const data = await res.json();
        output.innerText = data.respuesta;

    } catch (error) {
        output.innerText = "Error al conectarse con la IA: " + error;
    } finally {
        loading.style.display = "none";
    }
}
</script>
</body>
</html>
